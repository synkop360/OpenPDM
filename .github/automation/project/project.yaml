            closed: true

      - title: "Phase 3 Epic: Relationship Exploration Surface"
        body: |
          ## Objective
          Deliver the supported API and UI surfaces for exploring connected Assets.

          ## Description
          This epic turns the relationship foundation into visible user progress by exposing relationship navigation in the public application API and the supported UI surface.

          The exploration experience should help users understand how Assets are connected without introducing engineering-specific interpretation or advanced graph-analysis capabilities reserved for later phases.

          ## Expected Deliverable
          A relationship navigation experience that allows users to inspect an Asset's connections and traverse to related Assets safely.

          ## Acceptance Criteria
          - Users can view an Asset's related Assets through the supported product surface.
          - API responses provide enough information for clients to render relationship navigation consistently.
          - The exploration surface respects existing authorization boundaries.
          - The UI avoids implying unsupported domain-specific semantics.

          ## Dependencies
          - Phase 3 Epic: Relationship Architecture Decisions
          - Phase 3 Epic: Generic Asset Relationships

          ## Risks
          - UI exploration could imply graph semantics that are not yet defined.
          - Relationship rendering could become noisy or hard to interpret for new contributors.

          ## Exit Criteria
          - Connected Assets are navigable through a demonstrable user-facing surface.
          - The exploration path is understandable to a new contributor and aligned with the approved API contract.

          ## Suggested Labels
          feature, frontend, P2
        milestone: Relationship Exploration Surface
        labels:
          - feature
          - frontend
          - P2
        fields:
