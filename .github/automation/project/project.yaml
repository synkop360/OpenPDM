      - title: "Phase 2 Epic: Asset Locking and Concurrency Enforcement"
        body: |
          ## Objective
          Prevent unsafe concurrent modification of shared Engineering Assets.

          ## Description
          This epic delivers the server-side lock ownership, lock release and concurrent modification protection rules for the approved Phase 2 collaboration scope. It must remain generic and must not introduce engineering-domain semantics or desktop file synchronization behavior.

          ## Expected Deliverable
          API-enforced locking and concurrency controls that preserve the immutable Asset lifecycle during multi-user collaboration.

          ## Acceptance Criteria
          - Lock ownership and release rules are enforced consistently.
          - Invalid concurrent collaboration actions are rejected predictably.
          - Collaboration controls preserve Asset, Revision and Blob boundaries.

          ## Dependencies
          - Phase 2 Epic: Collaboration State Model and API Contracts
          - ADR-0003
          - ADR-0012
          - ADR-0016

          ## Risks
          - Locking could become too fine-grained for the approved Phase 2 scope.
          - Enforcement gaps could allow concurrent modification through different API paths.

          ## Exit Criteria
          - The platform prevents unsafe concurrent write behavior through the public API.
          - Lock state is consistent and test-covered across the delivered scope.

          ## Suggested Labels
          feature, core, P1
        milestone: Collaboration Control Model
        labels:
          - feature
          - core
          - P1
        fields:
          Phase: Collaboration
          Epic: Asset Locking and Concurrency Enforcement
          Platform Area: Platform Core
          Complexity: L
          ADR: ADR-0018
        sub_issues:

          - title: "Phase 2 Task: Define lock scope and ownership rules"
            body: |
              ## Objective
              Define how lock scope and ownership work in Phase 2.

              ## Description
              Decision made: Phase 2 uses Asset-level locking only.

              The accepted decision covers:
              - lock scope limited to the Asset;
              - lock owner stored as `user_id`;
              - lock target stored as `asset_id`;
              - lock enforcement scoped by Organization and Project context;
              - one active lock per Asset;
              - only the owner may perform normal check-in and unlock;
              - `Maintainer` and `Owner` may force-unlock;
              - no automatic lock expiration in Phase 2.

              This decision is recorded in ADR-0018.

              ## Acceptance Criteria
              - Lock scope is explicit for the approved Phase 2 model.
              - Ownership and release rules are explicit.
              - Authorization interactions are listed clearly.

              ## Dependencies
              - Phase 2 Task: Define generic collaboration state model

              ## Suggested Labels
              architecture, decision, documentation, P1
            labels:
              - architecture
              - decision
              - documentation
              - P1
            fields:
              Phase: Collaboration
              Epic: Asset Locking and Concurrency Enforcement
              Platform Area: Platform Module
              Complexity: M
              ADR: ADR-0018
            closed: true

          - title: "Phase 2 Task: Define stale lock transition conditions"
            body: |
              ## Objective
              Define exactly when an Asset must enter the `stale_lock` collaboration state in Phase 2.

              ## Description
              Decision made: Phase 2 treats `stale_lock` as an exceptional invalid-lock state with explicit, non-time-based entry conditions.

              The accepted decision covers:
              - `stale_lock` applies only when an active collaboration lock exists and can no longer be honored as a normal working lock;
              - archived Assets, inactive lock owners, and lost tenancy or write authority qualify as `stale_lock` conditions;
              - time, heartbeat, browser refresh, or desktop sync behavior do not create `stale_lock`;
              - only explicit unlock or force-unlock resolves the stale state in Phase 2;
              - API and Web UI behavior must distinguish `stale_lock` from a normal `locked` state.

              This decision is recorded in ADR-0024.

              ## Acceptance Criteria
              - `stale_lock` entry conditions are explicit and objectively testable.
              - Resolution authority and allowed actions are explicit.
              - API and Web UI expectations for `stale_lock` are clear for the approved v1 scope.

              ## Dependencies
              - Phase 2 Task: Define generic collaboration state model
              - Phase 2 Task: Define lock scope and ownership rules

              ## Suggested Labels
              architecture, decision, documentation, P2
            labels:
              - architecture
              - decision
              - documentation
              - P2
            fields:
              Phase: Collaboration
              Epic: Asset Locking and Concurrency Enforcement
              Platform Area: Platform Core
              Complexity: S
              ADR: ADR-0017, ADR-0018, ADR-0024
            closed: true

