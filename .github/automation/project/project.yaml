          - title: "Phase 2 Task: Define notification read and dismissal behavior"
            body: |
              ## Objective
              Define how users acknowledge or clear in-app collaboration notifications in Phase 2.

              ## Description
              Decision made: Phase 2 collaboration notifications use a simple per-user read model.

              The accepted decision covers:
              - notifications are per-user and move only between `unread` and `read`;
              - acknowledgment is per-user mark-as-read;
              - Phase 2 does not support dismiss, delete, archive or snooze behavior;
              - read notifications remain visible in the approved v1 surface;
              - the Web UI shows a simple empty state when no notifications are available.

              This decision is recorded in ADR-0025.

              ## Acceptance Criteria
              - Notification acknowledgment behavior is explicit for the approved Phase 2 scope.
              - Per-user visibility expectations are clear.
              - Backend and Web UI implementation can proceed without inventing notification lifecycle semantics.

              ## Dependencies
              - Phase 2 Task: Define Phase 2 in-app notification scope

