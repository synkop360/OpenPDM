      - title: "Phase 2 Epic: Collaboration Error Handling and Recovery Paths"
        body: |
          ## Objective
          Help users recover safely from collaboration failures.

          ## Description
          This epic delivers the user-facing and API-facing recovery guidance needed for lock contention, stale collaboration state, rejected check-ins and related failures in the approved Phase 2 scope.

