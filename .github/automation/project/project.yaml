          Complexity: M
          ADR: ADR-0001, ADR-0002, ADR-0023
        sub_issues:

          - title: "Phase 2 Task: Define collaboration audit and event coverage"
            body: |
              ## Objective
              Define which collaboration actions must produce audit records, domain events or both.

              ## Description
              Decision made: Phase 2 collaboration audit coverage is explicit.

              The auditable actions are:
              - checkout
              - checkin
              - unlock
              - force unlock
              - conflict detection
              - failed checkin
              - notification emitted

              Each audit entry must contain:
              - `actor_id`
              - `target_asset_id`
              - `event_type`
              - `timestamp`
              - `request_id`
              - `result`
              - `reason/error`

              This decision is recorded in ADR-0023.

              ## Acceptance Criteria
              - Required audit and event coverage is explicit.
              - Differences between timeline, audit and event uses are documented.
              - Deferred observability enhancements are listed clearly.

              ## Dependencies
              - Phase 2 Epic: Audit-Aligned Collaboration Observability

