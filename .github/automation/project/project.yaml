              The accepted decision covers:
              - an Assets Platform Module owning Asset, Revision, Representation and generic lifecycle status;
              - a Blobs Platform Module owning Blob records and Blob storage coordination;
              - Assets depending on the Blobs public interface, but not the reverse;
              - other Platform Modules depending on public interfaces only.

              The boundary rule is:
              - lifecycle semantics belong to Assets;
              - binary storage semantics belong to Blobs.

              This decision is recorded in ADR-0016.

              ## Acceptance Criteria
              - Ownership of Asset lifecycle responsibilities is explicit.
              - Public interfaces required by dependent modules are identified.
              - ADR-0016 exists and captures the decision.
              - The design remains aligned with ADR-0001, ADR-0002 and ADR-0003.

              ## Dependencies
