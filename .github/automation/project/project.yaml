          - title: "Phase 2 Task: Define conflict conditions for Phase 2 collaboration"
            body: |
              ## Objective
              Define the conflict conditions that Phase 2 must detect.

              ## Description
              Decision made: Phase 2 collaboration conflicts are explicitly defined.

              The approved conflict conditions are:
              - check-in without lock
              - check-in by non-owner
              - checkout on already locked asset
              - revision based on outdated revision
              - deleted or archived asset during collaboration
              - blob upload failure during check-in

              This decision is recorded in ADR-0022.

              ## Acceptance Criteria
              - Conflict conditions are explicit for the approved scope.
              - Stale-state and lock-contention cases are distinguished where needed.
              - Deferred sync-oriented conflict cases are listed clearly.

              ## Dependencies
              - Phase 2 Task: Define generic collaboration state model
              - Phase 2 Task: Define lock scope and ownership rules

