      - title: "Phase 1 Epic: Core Platform MVP Web UI"
        body: |
          ## Objective
          Expose the delivered Core Platform MVP capabilities through the Web UI as a normal API consumer.

          ## Description
          This epic provides the minimum Web UI surface required to demonstrate and use the delivered Phase 1 public application API. The Web UI must not bypass authorization or depend on Platform Module internals.

          ## Expected Deliverable
          A basic Web UI that supports authentication, Project selection, Engineering Asset browsing, upload and version history for the approved Phase 1 scope.

          ## Acceptance Criteria
          - The Web UI consumes the public application API only.
          - Authentication state is represented in the UI for the approved Phase 1 scope.
          - Users can navigate Organizations, Projects and Engineering Assets delivered in Phase 1.
          - Users can upload files and inspect version history through the UI.
          - UI behavior matches delivered backend capability and does not promise future roadmap features early.

          ## Dependencies
          - ADR-0007
          - Phase 1 Epic: Platform Access and Tenant Foundations
          - Phase 1 Epic: Engineering Asset Lifecycle MVP
          - Phase 1 Epic: Discoverability and Governance Foundations

          ## Risks
          - The UI could accidentally imply unsupported workflow, graph or collaboration features.
          - Frontend state and API contracts could drift without clear OpenAPI-driven alignment.

          ## Exit Criteria
          - A user can use the Web UI to exercise the delivered Phase 1 MVP path.
          - The UI remains a normal API consumer with no privileged access.

          ## Suggested Labels
          feature, frontend, P1
        milestone: Core Platform
