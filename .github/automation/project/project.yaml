          - title: "Phase 1 Task: Define authentication and user identity model"
            body: |
              ## Objective
              Define the Phase 1 authentication and user identity model before implementation proceeds.

              ## Description
              Decision made: Phase 1 adopts local authentication first with a user identity model that remains compatible with common OIDC claims.

              The accepted decision covers:
              - local authentication first;
              - User, Organization, Membership and Session / Access Token concepts;
              - minimum user fields: id, email, display_name, is_active, created_at;
              - compatibility with common OIDC-style claims such as sub, email and name;
              - explicit deferral of full OIDC protocol support and external identity provider integration.

              This decision is recorded in ADR-0009.

              ## Acceptance Criteria
              - The decision issue records the accepted authentication approach for Phase 1.
              - ADR-0009 exists and captures the decision.
              - The resulting decision preserves API-first access and modular boundaries.

              ## Dependencies
              - Phase 1 Epic: Platform Access and Tenant Foundations

              ## Suggested Labels
              architecture, documentation, P1
