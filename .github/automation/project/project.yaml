          - title: "Phase 1 Task: Define generic metadata model for Phase 1"
            body: |
              ## Objective
              Define the generic metadata model required for the Core Platform MVP.

              ## Description
              Decision made: Phase 1 adopts a generic key/value metadata model with no business semantics in the Platform Core.

              The accepted decision covers:
              - metadata stored as generic key/value entries;
              - a `MetadataEntry` model with `id`, `asset_id | revision_id | representation_id`, `key`, `value`, `value_type`, `source`, `created_at`;
              - allowed value types: `string`, `number`, `boolean`, `date`, `json`;
              - metadata stored by the Platform Core but never interpreted by it;
              - explicit preservation of a domain-agnostic Platform Core, even when values look engineering-specific.

              Example:
              - `material = "7075-T6"`

              The Platform Core knows how to store this metadata value, but it does not know what a material is.

              This decision is recorded in ADR-0010.

              ## Acceptance Criteria
              - Metadata scope for Phase 1 is explicit.
              - ADR-0010 exists and captures the decision.
              - The decision does not introduce engineering-domain knowledge.

              ## Dependencies
              - Phase 1 Epic: Discoverability and Governance Foundations

