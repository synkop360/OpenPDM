          ## Risks
          - The UI could hide lock state until after a conflicting action is attempted.
          - Collaboration controls could imply unsupported desktop-oriented behavior.

          ## Exit Criteria
          - Web users can complete the approved collaboration control flow end to end.
          - Lock and conflict state are visible in the main Web UI paths.

