      - title: "Phase 4 Epic: Plugin Architecture Decisions"
        body: |
          ## Objective
          Accept the durable architectural decisions required before executable plugin work begins.

          ## Description
          Define runtime isolation, platform administration, Extension API compatibility, plugin lifecycle, configuration ownership, provider contracts and event hooks while preserving Platform Core boundaries.

          ## Expected Deliverable
          Accepted ADR-0034 through ADR-0039.

          ## Acceptance Criteria
          - All Phase 4 architectural decisions are accepted.
          - ADR-0026 is explicitly superseded where platform administration permits mutation.
          - Official Plugins and Community Plugins receive identical Extension API access.
          - Phase 5 engineering semantics remain excluded.

          ## Dependencies
          - ADR-0001, ADR-0002, ADR-0003
          - ADR-0010, ADR-0012, ADR-0013, ADR-0026

          ## Risks
          - An underspecified runtime could expose Platform Module internals.
          - Tenant roles could be confused with deployment-wide authority.

          ## Exit Criteria
          - Phase 4 implementation requires no undocumented architectural choices.

          ## Suggested Labels
          architecture, plugin, decision, P0
