            body: |
              ## Objective
              Define the recovery guidance required for Phase 2 collaboration failures.

              ## Description
              Decision made: Phase 2 recovery behavior must preserve lifecycle integrity.

              The accepted recovery rules are:
              - fail safely
              - preserve uploaded blob content when possible
              - never create a partial revision
              - emit an audit event
              - return an explicit error

