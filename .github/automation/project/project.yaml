            closed: true

          - title: "Phase 2 Task: Define notification recipient targeting rules"
            body: |
              ## Objective
              Define which users should receive each approved collaboration notification in Phase 2.

              ## Description
              Decision made: Phase 2 notification recipients are derived from current Project membership with explicit actor rules.

              The accepted decision covers:
              - notifications are generated only for users who have `read_project` access in the related Project;
              - successful collaboration events notify all current Project members except the actor;
              - `conflict detected` notifies only the acting user whose action was rejected;
              - force unlock follows the same current-Project-member targeting rule;
              - notifications are not visible outside Project scope and are not backfilled for later members.

              This decision is recorded in ADR-0025.

              ## Acceptance Criteria
              - Notification recipient rules are explicit for each approved Phase 2 notification event.
              - Actor visibility versus non-actor visibility is clear.
              - Notification generation can proceed without inventing user-targeting semantics.

              ## Dependencies
              - Phase 2 Task: Define Phase 2 in-app notification scope

