      - title: "Phase 2 Epic: Collaboration Error Handling and Recovery Paths"
        body: |
          ## Objective
          Help users recover safely from collaboration failures.

          ## Description
          This epic delivers the user-facing and API-facing recovery guidance needed for lock contention, stale collaboration state, rejected check-ins and related failures in the approved Phase 2 scope.

          ## Expected Deliverable
          Clear recovery paths that keep users inside Platform Core rules instead of encouraging bypasses.

          ## Acceptance Criteria
          - Recovery expectations are explicit for the approved failure scenarios.
          - API and Web UI flows provide actionable next steps.
          - Recovery behavior remains within the approved v1 collaboration surface.

          ## Dependencies
          - Phase 2 Epic: Conflict Detection and User Feedback
          - Phase 2 Epic: In-App Collaboration Notifications

          ## Risks
          - Error handling could be left too generic to help users recover.
          - Recovery flows could imply unsupported override or workflow capabilities.

          ## Exit Criteria
          - Users can understand what to do next after approved collaboration failures.
          - Recovery behavior is documented and test-covered across the delivered scope.

          ## Suggested Labels
          feature, frontend, P2
