              ## Description
              Implement the traversal primitives owned by the Relationships Platform Module for outgoing, incoming, dependent and dependency traversal within the approved depth limits from ADR-0030.

              ## Acceptance Criteria
              - Traversal behavior respects the default and hard depth limits.
              - Traversal remains bounded and authorization-safe.
              - Direct dependency and dependent reads are supported.
              - Tests cover representative traversal shapes and boundary conditions.

              ## Dependencies
