  - phase: Core Platform
    milestone: Core Platform
    description: Deliver the first usable version of OpenPDM as a domain-agnostic Engineering Collaboration Platform with secure access, immutable Asset lifecycle management, auditable storage and foundational extension readiness.
    epics:

      - title: "Phase 1 Epic: Platform Access and Tenant Foundations"
        body: |
          ## Objective
          Establish the access and tenancy foundations required for a usable Core Platform MVP.

          ## Description
          This epic delivers the first secure entry point into OpenPDM through Organizations, Projects, Users, Authentication and baseline authorization. It must remain domain-agnostic and avoid introducing collaboration features that belong to later phases.

          ## Expected Deliverable
          A user can authenticate, belong to an Organization, access one or more Projects and interact with the public application API within baseline authorization rules.

          ## Acceptance Criteria
          - Organizations and Projects exist as Core Platform capabilities.
          - Registered users can be assigned to Organizations and Projects with explicit roles.
          - Membership role changes and removals preserve Owner safeguards and revoke access predictably.
          - User identity and authentication behavior are defined and implemented through the public application API.
          - Baseline authorization exists for the delivered Organization and Project capabilities.
          - The design remains consistent with the modular monolith and public Platform Module interface rules.
          - Any unresolved architectural decision is tracked explicitly as an issue instead of being invented during implementation.

          ## Dependencies
          - Phase 0 foundation
          - ADR-0001
          - ADR-0002

          ## Risks
          - Membership administration must not weaken Organization and Project ownership boundaries.
          - Authorization could become entangled with future collaboration or workflow requirements if scope is not controlled.

          ## Exit Criteria
          - A user can sign in through the public application API.
          - A user can belong to an Organization and access a Project according to baseline authorization rules.
          - The Core Platform remains domain-agnostic and no engineering-specific semantics are added.

          ## Suggested Labels
          feature, architecture, core, P1
