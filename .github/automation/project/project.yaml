      - title: "Phase 1 Epic: Engineering Asset Lifecycle MVP"
        body: |
          ## Objective
          Deliver the generic immutable Engineering Asset lifecycle defined by accepted ADRs.

          ## Description
          This epic introduces Assets, Revisions, Representations and Blobs as domain-agnostic Core Platform capabilities. It must implement immutable version history and file storage without introducing engineering-specific file understanding.

          ## Expected Deliverable
          A team can create and manage generic Engineering Assets through the public application API, upload and download Blob-backed files and inspect immutable version history.

          ## Acceptance Criteria
          - Assets, Revisions, Representations and Blobs are implemented as separate concepts.
          - Every Asset modification creates a new immutable Revision.
          - Revisions can own one or more Representations, and Representations can reference Blob content.
          - Blob content is stored separately from business data through the S3-compatible storage boundary.
          - No engineering-domain parsing or semantics are introduced in the Platform Core.

          ## Dependencies
          - ADR-0003
          - ADR-0005
          - ADR-0006
          - Phase 1 Epic: Platform Access and Tenant Foundations

          ## Risks
          - Revision, Representation and Blob ownership boundaries could blur if the model is implemented too quickly.
          - Blob persistence consistency between the database and object storage requires explicit error-handling design.

          ## Exit Criteria
          - Users can create Assets and add immutable Revisions.
          - Users can upload and download Blob-backed content through the public API.
          - Version history is visible through Asset and Revision retrieval flows.

          ## Suggested Labels
          feature, architecture, core, P1
        milestone: Engineering Asset Lifecycle MVP
        labels:
          - feature
          - architecture
          - core
          - P1
