        sub_issues:

          - title: "Phase 2 Task: Define Web UI collaboration control scope"
            body: |
              ## Objective
              Define the minimum Web UI collaboration flow for Phase 2.

              ## Description
              Decision made: Phase 2 defines a minimal Web UI collaboration control surface for the approved v1 path.

              The accepted Web UI collaboration scope includes:
              - visible collaboration states limited to `available`, `locked` and `stale_lock`;
              - visible lock ownership cues that distinguish current-user locks from locks held by another user;
              - the ability to trigger `checkout`, `checkin` and `unlock` through the public application API;
              - blocked-state messaging before a conflicting write action proceeds;
              - visible entry points to revision comments and the Asset timeline from the collaboration path.

              The accepted Web UI collaboration scope explicitly does **not** include:
              - desktop-specific collaboration behavior;
              - local file synchronization state;
              - workflow approval or review controls;
              - out-of-app notification delivery.

              This decision applies the public API and collaboration ADR set to the v1 Web UI surface.

              ## Acceptance Criteria
              - Required Web UI collaboration journeys are explicit.
              - Required lock and conflict states are listed.
              - Deferred desktop-oriented behaviors are listed clearly.

              ## Dependencies
              - Phase 2 Task: Define collaboration API contract surface

              ## Suggested Labels
              decision, documentation, frontend, P1
