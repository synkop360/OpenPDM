          - title: "Phase 2 Task: Define recovery behavior for approved collaboration failures"
            body: |
              ## Objective
              Define the recovery guidance required for Phase 2 collaboration failures.

              ## Description
              Decision made: Phase 2 recovery behavior must preserve lifecycle integrity.

              The accepted recovery rules are:
              - fail safely
              - preserve uploaded blob content when possible
              - never create a partial revision
              - emit an audit event
              - return an explicit error

              The key rule is: no partial check-in is visible as a valid revision.

              This decision is recorded in ADR-0022.

              ## Acceptance Criteria
              - Recovery guidance is explicit for the approved failure cases.
              - Unsupported override or escalation paths are not implied.
              - API and Web UI recovery expectations are aligned.

              ## Dependencies
              - Phase 2 Task: Define conflict conditions for Phase 2 collaboration

              ## Suggested Labels
