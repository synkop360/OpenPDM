            closed: true

          - title: "Phase 3 Task: Implement relationship and reference audit plus event emission"
            body: |
              ## Objective
              Make Phase 3 relationship and reference mutations observable.

              ## Description
              Implement the audit record generation and domain-event emission required by ADR-0032 so relationship and reference writes are traceable without conflating graph exploration with audit history.

              ## Acceptance Criteria
              - Approved mutation actions generate the required audit records.
              - Approved relationship and reference events are emitted consistently.
              - Graph reads are not audited by default unless explicitly configured or security-sensitive.
              - Tests cover representative audit and event behavior.

              ## Dependencies
              - Phase 3 Task: Implement relationship and reference mutation APIs

              ## Implementation Tasks
              - [ ] Emit the approved relationship mutation audit records.
              - [ ] Emit the approved reference mutation audit records.
              - [ ] Emit the approved domain events for relationship and reference changes.
              - [ ] Add tests for audit payload shape and event coverage.

