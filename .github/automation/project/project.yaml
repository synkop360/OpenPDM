              - decision
              - documentation
              - P1
            fields:
              Phase: Asset Graph
              Epic: Relationship Architecture Decisions
              Platform Area: Platform Core
              Complexity: S
              ADR: ADR-0029
            closed: true

          - title: "Define Phase 3 dependency graph and query scope"
            body: |
              ## Context

              The roadmap includes a dependency graph and generic graph queries in Phase 3, but there is no accepted decision yet that bounds what query behavior belongs in this phase.

              ## Why this issue exists

              Without an explicit scope decision, graph-query work could expand into advanced search, workflow semantics or Digital Thread behavior prematurely.

              ## Expected outcome

              Define the minimum Phase 3 dependency graph and query scope that remains generic, demonstrable and bounded.

              ## Decision scope

              This decision should clarify:

              - which dependency-oriented read scenarios are in scope
              - which graph traversals or filters are required
              - which advanced graph behaviors are deferred
              - how query behavior interacts with search and authorization boundaries
              - what counts as a usable Phase 3 result for contributors and users

              ## References

              - ROADMAP.md
              - docs/VISION.md
              - docs/ARCHITECTURE.md

              ## Suggested Labels
              architecture, decision, core, P1
            labels:
              - architecture
              - decision
              - core
              - P1
            fields:
              Phase: Asset Graph
              Epic: Relationship Architecture Decisions
              Platform Area: Platform Core
              Complexity: M
              ADR: ADR-0030
            closed: true

          - title: "Define generic references scope for Phase 3 Asset Graph"
            body: |
              ## Context

              The Phase 3 roadmap lists `generic references` as a primary capability alongside Asset relationships, dependency graph and graph queries, but no accepted ADR currently explains whether references are their own Platform Core concept or simply one class of generic relationship.

              ## Why this issue exists

              Without an explicit decision, implementation could introduce duplicate concepts or inconsistent semantics for references versus relationships.

              ## Expected outcome

              Define how generic references are represented in Phase 3 and how they relate to the broader Asset Graph model.

              ## Decision scope

              This decision should clarify:

              - whether generic references are distinct from other relationships
              - whether references are directional and how they are interpreted generically
              - which minimal behaviors are required in Phase 3
              - which reference semantics are deferred to plugins or later phases
              - how the concept stays domain-agnostic

              ## References

              - ROADMAP.md
              - docs/VISION.md
              - docs/PROJECT_CHARTER.md

              ## Suggested Labels
              architecture, decision, core, P1
            labels:
              - architecture
              - decision
              - core
              - P1
            fields:
              Phase: Asset Graph
              Epic: Relationship Architecture Decisions
              Platform Area: Platform Core
              Complexity: S
              ADR: ADR-0031
            closed: true

          - title: "Define Phase 3 relationship audit and event coverage"
            body: |
              ## Context

              The Project Charter requires significant business actions to be observable through logs, audit records and domain events. Phase 3 introduces relationship creation and mutation, but no accepted ADR currently defines which relationship actions must produce audit records, domain events or user-visible graph history.

              ## Why this issue exists

              Without an explicit observability decision, Asset Graph work could treat relationship reads as sufficient visibility or conflate graph exploration with audit history.

              ## Expected outcome

              Define the minimum audit and event coverage required for Phase 3 relationship mutations and clarify how that coverage differs from any user-facing graph exploration or history surface.

              ## Decision scope

              This decision should clarify:

              - which relationship actions are auditable
              - which relationship actions emit domain events
              - what minimum fields relationship audit records must include
              - whether any user-facing history surface is in scope for Phase 3
              - how observability stays distinct from graph navigation

              ## References

              - docs/PROJECT_CHARTER.md
              - docs/ARCHITECTURE.md
              - ADR-0001
              - ADR-0002

              ## Suggested Labels
              architecture, decision, documentation, P1
            labels:
              - architecture
              - decision
              - documentation
              - P1
            fields:
              Phase: Asset Graph
              Epic: Relationship Architecture Decisions
              Platform Area: Platform Core
              Complexity: S
              ADR: ADR-0032
            closed: true

