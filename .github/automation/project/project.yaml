  - phase: Asset Graph
    milestone: Asset Graph
    description: Introduce the generic Asset Graph so Assets can be connected, navigated and queried through explicit relationships without introducing engineering-domain semantics.
    epics:

      - title: "Phase 3 Epic: Relationship Architecture Decisions"
        body: |
          ## Objective
          Define the accepted architectural decisions required before Phase 3 relationship implementation begins.

          ## Description
          Phase 3 currently lacks accepted ADRs for the relationship model, Platform Module ownership boundaries, public application API surface and graph query constraints.

          This epic creates the decision-first planning slice required to keep Asset Graph work aligned with the Project Charter, the modular monolith architecture and existing Platform Core boundaries.

          ## Expected Deliverable
          Accepted Phase 3 ADRs that define the generic relationship architecture clearly enough to support implementation planning without hidden assumptions.

          ## Acceptance Criteria
          - The generic relationship model is explicitly defined.
          - Platform Module ownership and dependency direction are explicitly defined.
          - Public application API expectations for relationship operations are explicitly defined.
          - Dependency graph and query scope is explicitly bounded for Phase 3.
          - Generic references are explicitly defined or explicitly folded into another approved relationship concept.
          - Relationship audit and event coverage is explicitly defined for Phase 3 mutations.

          ## Dependencies
          - docs/PROJECT_CHARTER.md
          - docs/ARCHITECTURE.md
          - ROADMAP.md
          - ADR-0001
          - ADR-0002
          - ADR-0003
          - ADR-0015
          - ADR-0016

          ## Risks
          - Relationship behavior could drift into engineering semantics.
          - Module ownership could be inferred inconsistently without explicit ADRs.
          - Query scope could expand prematurely into later Digital Thread concerns.
          - Generic references could be implemented ambiguously if they are not defined relative to relationships.
          - User-facing graph visibility could be confused with audit or event history if observability scope is not explicit.

          ## Exit Criteria
          - Phase 3 relationship ADRs are accepted.
          - Asset Graph implementation Epics can proceed without unresolved architectural ambiguity.

          ## Suggested Labels
          architecture, decision, core, P1
        milestone: Relationship Architecture Decisions
        labels:
          - architecture
          - decision
          - core
          - P1
        fields:
          Phase: Asset Graph
          Epic: Relationship Architecture Decisions
          Platform Area: Platform Core
          Complexity: M
          ADR: ADR-0027, ADR-0028, ADR-0029, ADR-0030, ADR-0031, ADR-0032
        closed: true
        sub_issues:

          - title: "Define the generic relationship model for Phase 3 Asset Graph"
            body: |
              ## Context

              Phase 3 introduces generic Asset-to-Asset relationships, but no accepted ADR currently defines what a relationship is in Platform Core terms.

              ## Why this issue exists

              OpenPDM needs an explicit generic relationship model before implementation work can begin without architectural guesswork.

              ## Expected outcome

              Define the minimum Phase 3 relationship model, including identity, endpoints, allowed generic attributes, and the rules that keep the Platform Core domain-agnostic.

              ## Decision scope

              This decision should clarify:

              - how a relationship is represented generically
              - whether relationships are directed, typed, or both
              - which generic fields belong to the relationship record
              - which semantics are explicitly deferred to later phases or plugins
              - how relationship changes remain auditable

              ## References

              - docs/PROJECT_CHARTER.md
              - docs/ARCHITECTURE.md
              - ROADMAP.md
              - ADR-0003: Asset lifecycle model

              ## Suggested Labels
              architecture, decision, core, P1
            labels:
              - architecture
              - decision
              - core
              - P1
            fields:
              Phase: Asset Graph
              Epic: Relationship Architecture Decisions
              Platform Area: Platform Core
              Complexity: S
              ADR: ADR-0027
            closed: true

          - title: "Define Platform Module ownership and boundaries for Asset relationships"
            body: |
              ## Context

              Phase 3 adds relationship capabilities to the modular monolith, but no accepted ADR defines which Platform Module owns relationship business behavior or how other modules interact with it.

              ## Why this issue exists

              OpenPDM must preserve Public Module Interface discipline and avoid blurring Assets, Search, Audit and future graph-oriented responsibilities.

              ## Expected outcome

              Define which Platform Module owns relationship responsibilities, which public interfaces are required, and which dependency directions are allowed in Phase 3.

              ## Decision scope

              This decision should clarify:

              - which Platform Module owns relationship business logic
              - whether relationship behavior belongs inside an existing module or a dedicated module
              - which modules may depend on the relationship public interface
              - how authorization, audit and events interact with relationship operations
              - which cross-module shortcuts are forbidden

              ## References

              - ADR-0001: modular monolith
              - ADR-0002: platform boundaries
              - ADR-0015: Organization and Project module boundaries
              - ADR-0016: Asset lifecycle module boundaries

              ## Suggested Labels
              architecture, decision, module, P1
            labels:
              - architecture
              - decision
              - module
              - P1
            fields:
              Phase: Asset Graph
              Epic: Relationship Architecture Decisions
              Platform Area: Platform Module
              Complexity: M
              ADR: ADR-0028
            closed: true

          - title: "Define the public application API surface for Phase 3 relationships"
            body: |
              ## Context

              The Project Charter requires API-first delivery, but no accepted ADR currently defines the public application API surface for creating, reading or navigating relationships.

              ## Why this issue exists

              The Web UI, future Desktop Client and any automation clients must consume the same public relationship APIs without privileged internal access.

              ## Expected outcome

              Define the minimum public application API surface for Phase 3 relationship creation, retrieval and exploration.

              ## Decision scope

              This decision should clarify:

              - which relationship operations are public in Phase 3
              - how API shape supports both write and read scenarios
              - how tenancy and authorization are enforced consistently
              - which client behaviors are intentionally deferred
              - how API behavior stays aligned with the modular monolith boundaries

              ## References

              - docs/ARCHITECTURE.md
              - ADR-0007: Web UI stack
              - ADR-0008: Desktop client

              ## Suggested Labels
              architecture, decision, documentation, P1
            labels:
