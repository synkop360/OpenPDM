          - title: "Phase 3 Task: Implement relationship and reference mutation APIs"
            body: |
              ## Objective
              Deliver the write-side public API behavior for Phase 3 relationships and references.

              ## Description
              Implement the approved Phase 3 API operations needed to create and delete relationships, and the corresponding behavior for generic references where required by the delivered Asset Graph scope.

              ## Acceptance Criteria
              - Relationship write APIs follow ADR-0029.
              - Reference write APIs remain aligned with the approved generic reference model.
              - API responses do not expose storage or graph implementation details.
              - Tests cover representative successful and failing write flows.

              ## Dependencies
              - Phase 3 Task: Implement relationship and reference validation plus authorization

              ## Implementation Tasks
              - [ ] Implement public API handlers for approved relationship mutation operations.
              - [ ] Implement public API handlers for approved reference mutation operations.
              - [ ] Standardize write responses and error semantics.
              - [ ] Add tests for successful create and delete flows.

              ## Suggested Labels
              feature, core, documentation, test, P1
