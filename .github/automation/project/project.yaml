          - title: "Phase 1 Task: Define basic search scope and indexing strategy"
            body: |
              ## Objective
              Define the minimal search scope that Phase 1 must support.

              ## Description
              Decision made: Phase 1 search uses PostgreSQL only, with no external search engine.

              The accepted decision covers:
              - searchable Phase 1 scope limited to `asset name`, `asset description`, `metadata keys`, `metadata values`, and `revision comments`;
              - PostgreSQL full-text search as the search mechanism for Phase 1;
              - GIN indexes as the primary indexing strategy;
              - `JSONB` only where it is necessary for the approved metadata or search behavior;
              - explicit deferral of OpenSearch and other external search engines.

              PostgreSQL GIN indexes are considered sufficient for composite values and full-text search in the initial Core Platform MVP.

              This decision is recorded in ADR-0011.

              ## Acceptance Criteria
              - Searchable entities and fields are explicit.
              - Deferred search capabilities are listed.
              - ADR-0011 exists and captures the decision.

