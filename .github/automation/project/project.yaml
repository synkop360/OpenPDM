      - title: "Phase 1 Epic: Discoverability and Governance Foundations"
        body: |
          ## Objective
          Deliver the minimum discoverability and governance capabilities required for a usable Core Platform MVP.

          ## Description
          This epic introduces generic Metadata, Search, Permissions hardening, Audit and observable Events. The scope is intentionally limited to Phase 1 needs and must avoid future relationship graph or workflow semantics.

          ## Expected Deliverable
          Stored Engineering Assets can be enriched with generic metadata, found through basic search, protected by consistent authorization and traced through audit and event records.

          ## Acceptance Criteria
          - Metadata is handled as a generic Platform Core capability.
          - Basic search works for delivered Asset scope.
          - Authorization is hardened beyond baseline access control for delivered APIs.
          - Significant business actions generate audit records.
          - Significant business actions emit observable domain events.

          ## Dependencies
          - Phase 1 Epic: Platform Access and Tenant Foundations
          - Phase 1 Epic: Engineering Asset Lifecycle MVP
          - ADR-0001
          - ADR-0002
          - ADR-0003

          ## Risks
          - Search and metadata could accidentally introduce engineering semantics.
          - Audit and event scope could become too broad if not bounded to delivered business actions.

          ## Exit Criteria
          - Users can search and retrieve Assets using generic criteria.
          - Metadata behavior is available for delivered Asset scope.
          - Audit and event traces exist for the significant Phase 1 actions.
          - Authorization checks are applied consistently across delivered APIs.

