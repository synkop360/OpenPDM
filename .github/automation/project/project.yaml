              ## Suggested Labels
              ci, documentation, P2
            labels:
              - ci
              - documentation
              - P2
            fields:
              Phase: Foundation
              Epic: Continuous Integration Foundation
              Platform Area: Infrastructure
              Complexity: S
              ADR: ADR-0001

      - title: "Phase 0 Epic: Modular Monolith Skeleton"
        body: |
          ## Objective
          Create the initial application skeleton for the OpenPDM modular monolith.

          ## Description
          This epic establishes the structural foundation for the Platform Core and Platform Modules without implementing Phase 1 business capabilities. The skeleton must express accepted boundaries without adding engineering-specific behavior.

          ## Expected Deliverable
          A runnable application skeleton with clear places for Platform Core, Platform Modules, public module interfaces, Extension API and infrastructure adapters.

          ## Acceptance Criteria
          - Application skeleton runs locally.
          - Platform Core boundaries are visible in the structure.
          - Platform Modules communicate through public interfaces by convention and tests where practical.
          - No engineering-domain concepts are added to the Platform Core.
          - Extension API placeholder is present only as Phase 1/Phase 4 preparation, without privileged plugin behavior.

          ## Dependencies
          - ADR-0001
          - ADR-0002
          - ADR-0003

          ## Risks
          - Skeleton could over-design future modules before capabilities exist.
          - Extension API placeholder could imply unsupported plugin contracts too early.

          ## Exit Criteria
          - The application skeleton builds, tests and runs.
          - Architecture documentation and code structure agree on boundaries.
          - No Phase 1 Asset lifecycle behavior is implemented early.

          ## Suggested Labels
          architecture, core, P1
        labels:
          - architecture
          - core
          - P1
        fields:
          Phase: Foundation
          Epic: Modular Monolith Skeleton
          Platform Area: Platform Core
          Complexity: L
          ADR: ADR-0001, ADR-0002, ADR-0003
        sub_issues:

          - title: "Phase 0 Task: Create application entrypoint skeleton"
            body: |
              ## Objective
              Create the minimal application entrypoint for OpenPDM.

              ## Description
              Add a runnable entrypoint that proves the application can start without implementing Platform Core business capabilities.

              ## Acceptance Criteria
              - Application entrypoint exists.
              - Entrypoint can be run locally.
              - Entrypoint does not include engineering-domain behavior.

              ## Dependencies
              - Phase 0 Task: Provide local run command

              ## Suggested Labels
              feature, core, P1
            labels:
              - feature
              - core
              - P1
            fields:
              Phase: Foundation
              Epic: Modular Monolith Skeleton
              Platform Area: Platform Core
              Complexity: M
              ADR: ADR-0001

          - title: "Phase 0 Task: Define Platform Module boundary conventions"
            body: |
              ## Objective
              Define the initial structural conventions for Platform Module boundaries.

              ## Description
              Establish where public module interfaces and internal implementations belong, following ADR-0001 and ADR-0002.

              ## Acceptance Criteria
              - Public Module Interface location is documented or represented in structure.
              - Internal implementation location is separate from public interfaces.
              - Guidance states that Platform Modules must not access another module's internals.

              ## Dependencies
              - Phase 0 Task: Create application entrypoint skeleton

              ## Suggested Labels
              architecture, core, P1
            labels:
              - architecture
              - core
              - P1
            fields:
              Phase: Foundation
              Epic: Modular Monolith Skeleton
