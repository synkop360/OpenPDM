            closed: true

      - title: "Phase 1 Epic: Core Platform MVP Web UI"
        body: |
          ## Objective
          Expose the delivered Core Platform MVP capabilities through the Web UI as a normal API consumer.

          ## Description
          This epic provides the minimum Web UI surface required to demonstrate and use the delivered Phase 1 public application API. The Web UI must not bypass authorization or depend on Platform Module internals.

          The Phase 1 Web UI is a backend-first prototype sprint. The sprint goal is to close the existing Web UI issues by delivering a working prototype that exercises the delivered Phase 1 public application API from sign-in to file transfer.

          ## Expected Deliverable
          A basic Web UI that supports authentication, Organization and Project selection, Engineering Asset browsing, upload, download and version history for the approved Phase 1 scope.

          The prototype journey is:
          - sign in;
          - view available Organizations;
          - select an Organization and Project;
          - browse Engineering Assets;
          - inspect Asset details and immutable Revision history;
          - upload Blob-backed file content through the delivered API flow;
          - download Blob-backed content.

          A reusable manual test guide exists for this browser workflow so contributors can validate the prototype consistently on a local instance.

          ## Acceptance Criteria
          - The Web UI consumes the public application API only.
          - Authentication state is represented in the UI for the approved Phase 1 scope.
          - Users can navigate Organizations, Projects and Engineering Assets delivered in Phase 1.
          - Users can upload files and inspect version history through the UI.
          - Users can download Blob-backed content through the UI.
          - A documented manual verification path exists for the prototype journey from sign-in to download.
          - UI behavior matches delivered backend capability and does not promise future roadmap features early.

          ## Dependencies
          - ADR-0007
          - Phase 1 Epic: Platform Access and Tenant Foundations
          - Phase 1 Epic: Engineering Asset Lifecycle MVP
          - Phase 1 Epic: Discoverability and Governance Foundations

          ## Risks
          - The UI could accidentally imply unsupported workflow, graph or collaboration features.
          - Frontend state and API contracts could drift without clear OpenAPI-driven alignment.
          - Scope could drift into metadata management, search UI, audit UI or plugin UI before the prototype path is stable.

          ## Exit Criteria
          - A user can use the Web UI to exercise the delivered Phase 1 MVP path from sign-in to upload and download.
          - The UI remains a normal API consumer with no privileged access.
          - All current Web UI sub-issues are closed.

          ## Deferred Scope
          The Phase 1 Web UI sprint does not include:
          - metadata editing UI;
          - search UI;
          - audit or event browsing UI;
          - plugin management UI;
          - workflow, review or release UI;
          - relationship graph UI;
          - engineering-specific previews or file parsing.

