            body: |
              ## Objective
              Define the permission model required for consistent Phase 1 authorization.

              ## Description
              Decision made: Phase 1 adopts a simple RBAC model scoped by Project.

              The accepted decision covers:
              - `OrganizationRole` and `ProjectRole` as the Phase 1 authorization objects;
              - Phase 1 roles limited to `Owner`, `Maintainer`, `Contributor`, `Viewer`;
              - Phase 1 permissions limited to `read_project`, `manage_project`, `create_asset`, `update_asset`, `delete_asset`, `create_revision`, `manage_members`;
              - permissions calculated by the Platform Core;
              - no plugin participation in authorization decisions.

              The accepted decision explicitly avoids:
              - per-Asset permissions;
              - custom ACLs;
              - complex inheritance;
              - dynamic policy systems.

              This decision is recorded in ADR-0012.

