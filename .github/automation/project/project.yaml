          - title: "Phase 1 Task: Define Organization and Project public interfaces"
            body: |
              ## Objective
              Define the public Platform Module interfaces for Organization and Project capabilities.

              ## Description
              Decision made: Phase 1 uses two dedicated Platform Modules for tenancy-related business responsibilities.

              The accepted decision covers:
              - an Organization Platform Module owning Organization, Organization membership and Organization roles;
              - a Project Platform Module owning Project and Project-level role assignment;
              - Project depending on the Organization public interface, but not the reverse;
              - other Platform Modules depending on public interfaces only.

              The boundary rule is:
              - who belongs to the tenant belongs to Organization;
              - what exists inside the tenant belongs to Project.

              This decision is recorded in ADR-0015.

              ## Acceptance Criteria
              - Organization and Project ownership is explicit.
              - Public module interface boundaries are documented in the issue.
              - ADR-0015 exists and captures the decision.
              - The design does not bypass ADR-0001 or ADR-0002.

              ## Dependencies
              - Phase 1 Task: Define authentication and user identity model

