          - title: "Phase 3 Task: Expose generic references in the exploration surface"
            body: |
              ## Objective
              Make generic references visible without polluting the Asset Graph.

              ## Description
              Implement the API and UI presentation needed to show generic references distinctly from Asset-to-Asset relationships so users can see unresolved or external pointers without mistaking them for graph edges.

              ## Acceptance Criteria
              - References are rendered distinctly from Asset relationships.
              - External or unresolved targets are visible without being treated as Assets.
              - The UI and API wording stay aligned with ADR-0031.
