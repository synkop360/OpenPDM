    epics:

      - title: "Phase 2 Epic: Collaboration State Model and API Contracts"
        body: |
          ## Objective
          Define and expose the generic collaboration concepts required for Phase 2.

          ## Description
          This epic establishes the generic collaboration model for check-out, check-in, lock ownership, lock release, lock visibility and conflict rejection. It must remain separate from Phase 6 workflow behavior and explicitly exclude post-v1 desktop synchronization concerns.

          ## Expected Deliverable
          A documented and implemented API-facing collaboration model that other Phase 2 work can use consistently.

          ## Acceptance Criteria
          - Collaboration concepts and allowed state transitions are explicit for the approved Phase 2 scope.
          - Public API contracts for collaboration operations are defined and documented.
          - Deferred workflow and desktop behaviors are listed clearly.

          ## Dependencies
          - ADR-0001
          - ADR-0002
          - ADR-0012
          - ADR-0016

          ## Risks
          - Collaboration concepts could drift into workflow semantics that belong to Phase 6.
          - API contracts could imply desktop synchronization behavior that is explicitly deferred.

          ## Exit Criteria
          - Collaboration state terminology is stable for Phase 2 implementation.
          - API contracts are clear enough for backend and Web UI work to proceed without reopening scope.

          ## Suggested Labels
          architecture, core, P1
        milestone: Collaboration Control Model
        labels:
          - architecture
          - core
          - P1
        fields:
          Phase: Collaboration
          Epic: Collaboration State Model and API Contracts
          Platform Area: Platform Core
          Complexity: L
          ADR: ADR-0017, ADR-0019
        sub_issues:

          - title: "Phase 2 Task: Define generic collaboration state model"
            body: |
              ## Objective
              Define the generic Phase 2 collaboration model.

              ## Description
              Decision made: Phase 2 adopts a minimal Asset collaboration state model.

              The accepted decision covers:
              - collaboration states limited to `available`, `locked`, `stale_lock`;
              - collaboration state kept separate from lifecycle workflow semantics;
              - explicit deferral of workflow-engine concepts such as review, approval and release;
              - explicit deferral of desktop synchronization state behavior.

              `stale_lock` is an exceptional collaboration state and is not automatic time-based lock expiration.

              This decision is recorded in ADR-0017.

              ## Acceptance Criteria
              - The Phase 2 collaboration concepts are explicit.
              - Allowed and disallowed state transitions are listed.
              - Deferred workflow and desktop behaviors are listed clearly.

              ## Dependencies
              - Phase 2 Epic: Collaboration State Model and API Contracts

              ## Suggested Labels
              architecture, decision, documentation, P1
            labels:
              - architecture
              - decision
              - documentation
              - P1
            fields:
              Phase: Collaboration
              Epic: Collaboration State Model and API Contracts
              Platform Area: Platform Module
              Complexity: M
              ADR: ADR-0017
            closed: true

          - title: "Phase 2 Task: Define collaboration API contract surface"
            body: |
              ## Objective
              Define the public application API surface for collaboration controls.

              ## Description
              Decision made: Phase 2 exposes collaboration behavior through the public application API only.

              The accepted API surface is:
              - `POST /assets/{id}/checkout`
              - `POST /assets/{id}/checkin`
              - `POST /assets/{id}/unlock`
              - `GET /assets/{id}/collaboration-state`
              - `GET /assets/{id}/timeline`

              The Desktop Client, when introduced later, must use these same public APIs.

              This decision is recorded in ADR-0019.

              ## Acceptance Criteria
              - Required collaboration endpoints or actions are explicit.
              - Error and conflict responses are explicit for the approved scope.
              - The contract uses public API boundaries only.

              ## Dependencies
              - Phase 2 Task: Define generic collaboration state model

              ## Suggested Labels
              architecture, decision, documentation, P1
            labels:
              - architecture
              - decision
              - documentation
              - P1
            fields:
              Phase: Collaboration
              Epic: Collaboration State Model and API Contracts
              Platform Area: Platform Core
              Complexity: M
              ADR: ADR-0019
