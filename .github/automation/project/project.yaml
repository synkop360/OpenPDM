              The approved notification events are:
              - `asset locked`
              - `asset unlocked`
              - `revision created`
              - `force unlock`
              - `conflict detected`

              Deferred channels include email, webhooks, desktop push and Slack/Teams.

              This decision is recorded in ADR-0021.

