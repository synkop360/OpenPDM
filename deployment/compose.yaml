services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openpdm}
      POSTGRES_USER: ${POSTGRES_USER:-openpdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openpdm}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openpdm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-openpdm}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-openpdm-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      OPENPDM_ENV: development
      OPENPDM_DATABASE_URL: postgresql+psycopg://openpdm:openpdm@postgres:5432/openpdm
      OPENPDM_S3_ENDPOINT_URL: http://minio:9000
      OPENPDM_S3_BUCKET: openpdm-blobs
      OPENPDM_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-openpdm}
      OPENPDM_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-openpdm-secret}
      OPENPDM_PLUGIN_PACKAGE_ROOT: /var/lib/openpdm/plugins
    volumes:
      - plugin-packages:/var/lib/openpdm/plugins
    ports:
      - "${OPENPDM_BACKEND_HOST_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres-data:
  minio-data:
  plugin-packages:
